version: '3.8'

services:
  # ─── MySQL Database ───
  mysql:
    image: mysql:8.0
    container_name: socialy-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: social_networking
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socialy-net

  # ─── Redis Cache ───
  redis:
    image: redis:7-alpine
    container_name: socialy-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - socialy-net

  # ─── Spring Boot Backend ───
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialy-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialy-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# KHAI BÁO MẠNG EXTERNAL
networks:
  socialy-net:
    external: true