# ================= APP =================
server.port=8080
spring.application.name=social-networking-backend

# ================= DATABASE =================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ================= JPA / HIBERNATE =================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# ================= SECURITY =================
app.security.password.min-length=8
app.security.password.require-lowercase=true
app.security.password.require-number=true
app.security.password.require-special=true
app.security.password.special-chars=!@#$%^&*(),.?":{}|<>

# ================= JWT =================
jwt.secret=${JWT_SECRET_KEY}
jwt.access.expiration_time=${JWT_ACCESS_EXPIRATION_TIME}
jwt.refresh.expiration_time=${JWT_REFRESH_EXPIRATION_TIME}

# ================= OAUTH2 =================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI}

# ================= CRON =================
cron.deleteExpiredTokenBlacklist=0 0 0 * * ?

# ================= CLOUDINARY =================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ================= SWAGGER =================
springdoc.api-docs.enabled=true
springdoc.packagesToScan=com.example.socialnetworkingbackend.controller
springdoc.pathsToMatch=/**

# ================= ADMIN =================
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}
admin.lastName=${ADMIN_LASTNAME}
admin.firstName=${ADMIN_FIRSTNAME}
admin.email=${ADMIN_EMAIL}

# ================= MAIL =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

# ================= FILE UPLOAD =================
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE}
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE}

# ================= REDIS =================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=60000

# ================= LOGGING =================
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ================= CORS =================
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}