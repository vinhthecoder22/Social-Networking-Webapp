#App
server.port=8080
spring.application.name=social-networking-backend

#DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/social_networking?createDatabaseIfNotExist=true
spring.datasource.username=
spring.datasource.password=

#JPA / HIBERNATE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# PASSWORD POLICY CONFIG
app.security.password.min-length=8
app.security.password.require-lowercase=true
app.security.password.require-number=true
app.security.password.require-special=true
app.security.password.special-chars=!@#$%^&*(),.?":{}|<>